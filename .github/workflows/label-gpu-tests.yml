name: Modal GPU Tests (label-triggered)

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  run-if-labeled:
    if: github.event.label.name == 'gpu-tests'
    uses: ./.github/workflows/_modal-gpu-tests.yml
    with:
      ref: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  remove-label:
    needs: run-if-labeled
    if: github.event.label.name == 'gpu-tests'
    runs-on: ubuntu-latest
    steps:
      - name: Remove label after completion
        uses: actions-ecosystem/action-remove-labels@v1
        with:
          labels: gpu-tests
